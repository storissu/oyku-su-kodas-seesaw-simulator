<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seesaw</title>
    <link rel="stylesheet" href="style.css" />
<link href="https://fonts.googleapis.com/css2?family=Gabarito:wght@400..900&display=swap" rel="stylesheet">  <body>
    <div class="container">
        <h1 >Seesaw Simulator</h1>
      <div class="simulation-container">
        
        <section class="info-container">
          <div id="left-weight" class="info-box">
            <div class="info-title">LEFT WEIGHT</div>
            <div class="info-text"></div>
          </div>

          <div id = "right-weight" class="info-box">
            <div class="info-title">RIGHT WEIGHT</div>
            <div class="info-text"></div>
          </div>

          <div id = "next-weight" class="info-box">
            <div class="info-title">NEXT WEIGHT</div>
            <div class="info-text"></div>
          </div>

          <div id = "tilt-angle" class="info-box">
            <div class="info-title">TILT ANGLE</div>
            <div class="info-text"></div>
          </div>
          <div id ="tip" class="info-box">
            <div class="info-title">TIP</div>
            <div class="info-text"></div>
          </div>
        </section>

        <div class="seesaw-container">
          <div class="seesaw">
            <div class="plank-container">
              <div class="plank"></div>
            </div>
            <div class="pivot-container">
              <div class="pivot"></div>
            </div>
          </div>
      </div>
    </div>
      <section class="button-group">
        <button class="reset-button">
          <svg
            class="reset-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
            <path d="M21 3v5h-5" />
            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
            <path d="M3 21v-5h5" />
          </svg>
          Reset Seesaw
        </button>

        <button class="pause-button">
          <svg
            class="pause-icon"
            viewBox="0 0 24 24"
            fill="currentColor"
            stroke-width="2"
          >
            <rect x="6" y="5" width="3" height="14" />
            <rect x="14" y="5" width="3" height="14" />
          </svg>
          Pause Seesaw
        </button>

        <button class="undo-button">
          <svg
            class="undo-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 7v6h6" />
            <path d="M3 13c2-4 6-6 10-6a7 7 0 1 1 0 14h-1" />
          </svg>
          Undo Weight
        </button>
      </section>
      <h2>History Logs</h2>
     <div class="history-container">
  <div class="history-header">
    <span>Drop Record</span>
    <span>Weight</span>
    <span>Side</span>
    <span>Position</span>
    <span>Time</span>
  </div>

  <div id="history-list"></div>
</div>
      
      </div>
    <script src="script.js"></script>
  </body>
</html>
